<div class="modal fade" id="policyDialog" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content app-modal">
            <div class="modal-header">
                <h5 class="modal-title">Unos police</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="policyAlert"></div>
                <form id="policyForm" novalidate>
                    <div class="form-group">
                        <label for="policyPartnerId">Partner <span class="req">*</span></label>
                        <select class="form-control" id="policyPartnerId" required>
                            <option value="" disabled selected>Odaberite partnera...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="policyNumber">Broj police <span class="req">*</span></label>
                        <input type="text" class="form-control" id="policyNumber" required minlength="10" maxlength="15" placeholder="10–15 znakova">
                        <div class="invalid-feedback">Mora imati između 10 i 15 znakova.</div>
                    </div>
                    <div class="form-group">
                        <label for="policyAmount">Iznos police <span class="req">*</span></label>
                        <input type="number" class="form-control" id="policyAmount" required min="0.01" step="0.01" placeholder="0,00">
                        <div class="invalid-feedback">Unesite iznos veći od 0.</div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">Spremi policu</button>
                </form>
            </div>
        </div>
    </div>
</div>
