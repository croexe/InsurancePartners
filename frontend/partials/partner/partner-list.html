<section id="view-list" class="view">
    <div class="view-header">
        <div>
            <p class="eyebrow">Registar partnera</p>
            <h1 class="view-title">Partneri</h1>
        </div>
        <div class="view-actions">
            <button type="button" class="btn btn-ghost" id="btnOpenPolicyDialog">
                Dodaj policu
            </button>
            <button type="button" class="btn btn-primary" id="btnGoToPartnerForm">
                Novi partner
            </button>
        </div>
    </div>

    <div id="listAlert"></div>

    <div class="card-panel">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Naziv</th>
                    <th>Broj Partnera</th>
                    <th>OIB</th>
                    <th>Vrsta</th>
                    <th>Datum unosa</th>
                    <th>Stranac</th>
                    <th>Spol</th>
                </tr>
            </thead>
            <tbody id="partnerTableBody">
                <tr><td colspan="7" class="empty-cell">Učitavanje...</td></tr>
            </tbody>
        </table>
        <div class="pagination-bar" id="paginationBar">
            <span class="pagination-info" id="paginationInfo"></span>
            <div class="pagination-controls" id="paginationControls"></div>
        </div>
    </div>
</section>
