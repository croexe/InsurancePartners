<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava — Insurance Partners</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

    <link rel="stylesheet" href="css/base/tokens.css">
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/layout/topbar.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/alerts.css">

    <style>
        body {
            background-color: var(--paper);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .login-card {
            background: var(--paper-card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .login-card__eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--slate);
            margin: 0 0 4px;
        }

        .login-card__title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 26px;
            color: var(--navy);
            margin: 0 0 28px;
        }

        .login-error {
            display: none;
            font-size: 13px;
            color: var(--red);
            background: var(--red-soft);
            border: 1px solid rgba(179, 57, 44, 0.2);
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar__inner">
            <div class="topbar__brand">
                <span class="topbar__mark">IP</span>
                <span class="topbar__title">Insurance Partners</span>
            </div>
        </div>
    </header>

    <div class="login-wrap">
        <div class="login-card">
            <p class="login-card__eyebrow">Dobrodošli</p>
            <h1 class="login-card__title">Prijava</h1>

            <div class="login-error" id="loginError"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">E-mail <span class="req">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="ime@wiener.hr" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Lozinka <span class="req">*</span></label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-submit" id="btnLogin">
                    Prijava
                </button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (auth.isAuthenticated()) {
            window.location.href = "index.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const btn = document.getElementById("btnLogin");
            const errorEl = document.getElementById("loginError");

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            errorEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Prijava...";

            try {
                const data = await api.login(email, password);
                auth.saveToken(data.token);
                window.location.href = "index.html";
            } catch {
                errorEl.textContent = "Pogrešan e-mail ili lozinka.";
                errorEl.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Prijava";
            }
        });
    </script>
</body>
</html>
